<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<h2>Smart Autofill Profile</h2>

<div class="field">
  <label>Full Name</label>
  <input id="fullName">
</div>

<div class="field">
  <label>First Name</label>
  <input id="firstName">
</div>

<div class="field">
  <label>Last Name</label>
  <input id="lastName">
</div>

<div class="field">
  <label>Email</label>
  <input id="email">
</div>

<div class="field">
  <label>Phone</label>
  <input id="phone">
</div>

<div class="field">
  <label>Address</label>
  <input id="address">
</div>

<div class="field">
  <label>City</label>
  <input id="city">
</div>

<div class="field">
  <label>Pincode</label>
  <input id="pincode">
</div>

<button id="saveBtn">Save Profile</button>
<button id="downloadBtn">Download Profile</button>
<input type="file" id="importInput" accept="application/json" style="display:none">
<button id="importBtn">Import Profile</button>

<script src="popup.js"></script>
</body>
</html>
